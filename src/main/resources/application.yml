spring:
  application:
    name: GIF-server-v2
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DB_HOST}
    driver-class-name: ${DB_DRIVER}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    datetime:
      write-dates-as-timestamps: false

oauth:
  datagsm:
    client-id: ${DATAGSM_CLIENT_ID:}
    client-secret: ${DATAGSM_CLIENT_SECRET:}
    redirect-uris:
      - ${DATAGSM_REDIRECT_URIS:http://localhost:8080/api/auth/dg/callback}
  google:
    client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
    client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    scopes: ${OAUTH_GOOGLE_SCOPES:openid email profile}
    redirect-uris:
      - ${OAUTH_GOOGLE_REDIRECT_URIS}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  oauth-state:
    store: ${OAUTH_STATE_STORE:memory}

file:
  upload-dir: ${FILE_UPLOAD_DIR}
  base-url: ${FILE_BASE_URL}

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api-docs

openai:
  api-key: ${OPEN_API_KEY:}