name: Spring Boot CD

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 24157
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/GIF_SERVER
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f

      - name: GIF_SERVER CD Discord Notification (success)
        if: ${{ success() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          ack_no_webhook: true
          title: '✅ 성공 했다능! ✅'
          status: ${{ job.status }}
          description: '서버 배포 성공'
          color: 65280
          username: 'GIF-SERVER-bot'

      - name: GIF_SERVER CD Discord Notification (failure)
        if: ${{ failure() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          ack_no_webhook: true
          title: '❗️ 실패했다능! ❗️'
          status: ${{ job.status }}
          description: '서버 배포 실패'
          color: 16711680
          username: 'GIF-SERVER-bot'
