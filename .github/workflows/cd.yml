name: Spring Boot CD

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 24157 158.247.251.109 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 서버 배포 (SSH)
        run: |
          ssh -p 24157 -i ~/.ssh/id_ed25519 ubuntu@158.247.251.109 << 'EOF'
          set -e
          cd ~/GIF_SERVER
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f
          EOF

      - name: GIF_SERVER CD Discord Notification (success)
        if: ${{ success() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          ack_no_webhook: true
          title: '✅ 성공 했다능! ✅'
          status: ${{ job.status }}
          description: '서버 배포 성공'
          color: 65280
          username: 'GIF-SERVER-bot'

      - name: GIF_SERVER CD Discord Notification (failure)
        if: ${{ failure() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_GIF_SERVER }}
          ack_no_webhook: true
          title: '❗️ 실패했다능! ❗️'
          status: ${{ job.status }}
          description: '서버 배포 실패'
          color: 16711680
          username: 'GIF-SERVER-bot'
